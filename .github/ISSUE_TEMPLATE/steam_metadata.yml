name: Steam metadata or cover issue
description: Report missing/wrong Steam details, covers, delisted detection, or regional metadata behavior.
title: "metadata: "
labels: ["metadata", "steam-store", "needs-triage"]
body:
  - type: input
    id: version
    attributes:
      label: Repressurizer version
      placeholder: "v0.1.3"
    validations:
      required: true
  - type: input
    id: appid
    attributes:
      label: Steam App ID
      placeholder: "3590"
    validations:
      required: true
  - type: input
    id: game
    attributes:
      label: Game name
      placeholder: "Plants vs. Zombies GOTY Edition"
    validations:
      required: true
  - type: input
    id: region
    attributes:
      label: Currency/region setting
      placeholder: "EUR / Germany, USD / United States, etc."
  - type: dropdown
    id: issue-type
    attributes:
      label: What is wrong?
      options:
        - Details did not fetch
        - Cover/artwork missing
        - Wrong title
        - Wrong release date
        - Wrong platform/genre/category
        - Marked likely delisted but exists
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Include what Repressurizer shows and what Steam Store shows.
    validations:
      required: true
  - type: input
    id: store-url
    attributes:
      label: Steam Store URL, if public
      placeholder: "https://store.steampowered.com/app/3590/"
