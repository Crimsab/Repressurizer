version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Rome
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci"

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: Europe/Rome
    labels:
      - dependencies
      - documentation
    commit-message:
      prefix: "docs"
