name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    name: Windows installer and portable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Build Windows bundles
        run: bun tauri build

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item src-tauri\target\release\repressurizer.exe artifacts\Repressurizer-portable.exe
          Compress-Archive -Path artifacts\Repressurizer-portable.exe -DestinationPath artifacts\Repressurizer-portable-windows-x64.zip -Force
          Copy-Item src-tauri\target\release\bundle\nsis\*.exe artifacts\
          Get-ChildItem artifacts | ForEach-Object { "$($_.Name) $($_.Length) bytes" }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repressurizer-windows
          path: artifacts/*
          if-no-files-found: error

      - name: Create release notes
        id: notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = gh api "repos/${{ github.repository }}/releases/generate-notes" `
            -f tag_name="$tag" `
            -f target_commitish="${{ github.sha }}" `
            --jq .body
          @"
          ## Repressurizer $tag

          Modern Steam library management, inspired by Depressurizer.

          ### Downloads

          - `Repressurizer_*.exe`: Windows installer
          - `Repressurizer-portable-windows-x64.zip`: portable Windows build
          - `Repressurizer-portable.exe`: unpacked portable executable

          ### Changelog

          $notes
          "@ | Set-Content -Path release-notes.md

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Repressurizer ${{ github.ref_name }}
          body_path: release-notes.md
          files: artifacts/*
          fail_on_unmatched_files: true
