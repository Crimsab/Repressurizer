name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HAS_VT_API_KEY: ${{ secrets.VT_API_KEY != '' }}

jobs:
  windows:
    name: Windows installer and portable
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          if ("${{ github.ref_name }}" -ne "${{ steps.version.outputs.tag }}") {
            throw "Tag ${{ github.ref_name }} does not match package version ${{ steps.version.outputs.tag }}"
          }

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: windows-release
          cache-on-failure: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Build Windows bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun tauri build

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item src-tauri\target\release\repressurizer.exe artifacts\Repressurizer-portable.exe
          Compress-Archive -Path artifacts\Repressurizer-portable.exe -DestinationPath artifacts\Repressurizer-portable-windows-x64.zip -Force
          Copy-Item src-tauri\target\release\bundle\nsis\*.exe artifacts\
          Copy-Item src-tauri\target\release\bundle\nsis\*.sig artifacts\
          Get-ChildItem artifacts | ForEach-Object { "$($_.Name) $($_.Length) bytes" }

      - name: Create updater manifest
        shell: pwsh
        run: |
          $installer = Get-ChildItem artifacts -Filter "Repressurizer_*_x64-setup.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Could not find NSIS installer"
          }

          $signaturePath = "$($installer.FullName).sig"
          if (-not (Test-Path $signaturePath)) {
            throw "Could not find updater signature for $($installer.Name)"
          }

          $assetUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($installer.Name)"
          $manifest = [ordered]@{
            version = "${{ steps.version.outputs.version }}"
            notes = "Modern Steam library management, inspired by Depressurizer."
            pub_date = (Get-Date).ToUniversalTime().ToString("o")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = (Get-Content $signaturePath -Raw).Trim()
                url = $assetUrl
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 8 | Set-Content -Path artifacts\latest.json -Encoding utf8

      - name: Upload workflow artifacts
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: repressurizer-windows
          path: artifacts/*
          if-no-files-found: error

      - name: Create release notes
        id: notes
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun scripts/release-notes.ts --repo "${{ github.repository }}" --tag "${{ github.ref_name }}" --sha "${{ github.sha }}" --out release-notes.md

      - name: VirusTotal Scan
        id: vt-scan
        if: startsWith(github.ref, 'refs/tags/') && env.HAS_VT_API_KEY == 'true'
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          request_rate: 4
          files: |
            artifacts/*.exe
            artifacts/*.zip

      - name: Check VirusTotal verdicts
        id: vt-verdict
        if: startsWith(github.ref, 'refs/tags/') && steps.vt-scan.outputs.analysis != ''
        shell: pwsh
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          VT_ANALYSIS: ${{ steps.vt-scan.outputs.analysis }}
        run: |
          $ErrorActionPreference = "Stop"

          function Get-Stat($stats, $name) {
            $property = $stats.PSObject.Properties[$name]
            if ($null -eq $property -or $null -eq $property.Value) {
              return 0
            }
            return [int]$property.Value
          }

          function Get-Detections($results) {
            if ($null -eq $results) {
              return @()
            }

            $detections = @()
            foreach ($result in $results.PSObject.Properties) {
              $category = $result.Value.category
              if ($category -eq "malicious" -or $category -eq "suspicious") {
                $engine = $result.Value.engine_name
                if (-not $engine) {
                  $engine = $result.Name
                }
                $verdict = $result.Value.result
                if (-not $verdict) {
                  $verdict = $category
                }
                $detections += "${engine}: ${verdict}"
              }
            }
            return $detections
          }

          $headers = @{ "x-apikey" = $env:VT_API_KEY }
          $entries = $env:VT_ANALYSIS -split "," | Where-Object { $_ -match "=" }
          $lines = @()
          $detections = @()

          foreach ($entry in $entries) {
            $parts = $entry -split "=", 2
            $name = Split-Path $parts[0] -Leaf
            $url = $parts[1]

            if ($url -notmatch "/file-analysis/([^/]+)/") {
              $lines += "- ${name}: unable to parse VirusTotal analysis link - $url"
              continue
            }

            $analysisId = $Matches[1]
            $attributes = $null

            for ($attempt = 1; $attempt -le 18; $attempt++) {
              $response = Invoke-RestMethod `
                -Headers $headers `
                -Uri "https://www.virustotal.com/api/v3/analyses/$analysisId"

              $attributes = $response.data.attributes
              if ($attributes.status -eq "completed") {
                break
              }

              Start-Sleep -Seconds 10
            }

            if ($null -eq $attributes -or $attributes.status -ne "completed") {
              $lines += "- ${name}: analysis still pending after timeout - $url"
              continue
            }

            $stats = $attributes.stats
            $malicious = Get-Stat $stats "malicious"
            $suspicious = Get-Stat $stats "suspicious"
            $harmless = Get-Stat $stats "harmless"
            $undetected = Get-Stat $stats "undetected"
            $timeout = Get-Stat $stats "timeout"
            $engines = Get-Detections $attributes.results
            $engineText = ""
            if ($engines.Count -gt 0) {
              $engineText = " detections: " + ($engines -join "; ")
            }

            $lines += "- ${name}: ${malicious} malicious, ${suspicious} suspicious, ${harmless} harmless, ${undetected} undetected, ${timeout} timeout.${engineText} - $url"

            if ($malicious -gt 0 -or $suspicious -gt 0) {
              $detections += "${name}: ${malicious} malicious, ${suspicious} suspicious"
            }
          }

          $markdown = $lines -join "`n"
          $delimiter = [guid]::NewGuid().ToString()
          "markdown<<$delimiter" >> $env:GITHUB_OUTPUT
          $markdown >> $env:GITHUB_OUTPUT
          "$delimiter" >> $env:GITHUB_OUTPUT

          if ($detections.Count -gt 0) {
            $message = $detections -join "; "
            Write-Output "::warning::VirusTotal reported detections: $message"
          }

      - name: Append VirusTotal results
        if: startsWith(github.ref, 'refs/tags/') && steps.vt-scan.outputs.analysis != ''
        shell: pwsh
        env:
          VT_ANALYSIS: ${{ steps.vt-scan.outputs.analysis }}
          VT_VERDICTS: ${{ steps.vt-verdict.outputs.markdown }}
        run: |
          $lines = "- " + ($env:VT_ANALYSIS -replace "artifacts/", "" -replace "=h", ": h" -replace ",", "`n- ")
          Add-Content -Path release-notes.md -Value "`n## VirusTotal`n`n$lines`n"
          if ($env:VT_VERDICTS) {
            Add-Content -Path release-notes.md -Value "`n### Verdicts`n`n$env:VT_VERDICTS`n"
          }

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          name: Repressurizer ${{ github.ref_name }}
          body_path: release-notes.md
          files: artifacts/*
          fail_on_unmatched_files: true
