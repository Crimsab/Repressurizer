name: Tag Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - src-tauri/tauri.conf.json
      - src-tauri/Cargo.toml
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tag:
    name: Create version tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package version
        id: version
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Verify version files match
        run: |
          package_version="${{ steps.version.outputs.version }}"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          cargo_version="$(awk -F '"' '/^version = / { print $2; exit }' src-tauri/Cargo.toml)"

          if [ "$package_version" != "$tauri_version" ]; then
            echo "package.json ($package_version) and tauri.conf.json ($tauri_version) versions differ"
            exit 1
          fi

          if [ "$package_version" != "$cargo_version" ]; then
            echo "package.json ($package_version) and Cargo.toml ($cargo_version) versions differ"
            exit 1
          fi

      - name: Check whether tag exists
        id: existing
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.existing.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Repressurizer ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Report existing tag
        if: steps.existing.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.tag }} already exists; skipping."
