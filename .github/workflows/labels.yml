name: Labels

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  sync:
    name: Sync repository labels
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main

      - name: Sync labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ruby <<'RUBY'
          require "yaml"
          require "open3"

          labels = YAML.load_file(".github/labels.yml")

          labels.each do |label|
            name = label.fetch("name")
            color = label.fetch("color").delete_prefix("#")
            description = label.fetch("description", "")

            create_args = [
              "gh", "label", "create", name,
              "--color", color,
              "--description", description
            ]

            edit_args = [
              "gh", "label", "edit", name,
              "--color", color,
              "--description", description
            ]

            system(*create_args) || system(*edit_args) || abort("Failed to sync label: #{name}")
          end
          RUBY
