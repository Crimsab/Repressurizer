name: Publish Rust Integration Crate

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and package without publishing"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "rust-integration-v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Rust crate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.94.0

      - name: Check Rust crate
        run: cargo check --manifest-path packages/rust/Cargo.toml

      - name: Test Rust crate
        run: cargo test --manifest-path packages/rust/Cargo.toml

      - name: Dry-run Rust crate publish
        run: cargo publish --dry-run --manifest-path packages/rust/Cargo.toml

      - name: Validate Rust integration tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="$(cargo pkgid --manifest-path packages/rust/Cargo.toml | sed 's/.*@//')"
          expected="rust-integration-v${version}"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "Expected tag ${expected}, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.94.0

      - name: Check Rust crate
        run: cargo check --manifest-path packages/rust/Cargo.toml

      - name: Test Rust crate
        run: cargo test --manifest-path packages/rust/Cargo.toml

      - name: Publish Rust crate
        run: cargo publish --manifest-path packages/rust/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
