name: Preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows preview installer
    runs-on: windows-2025-vs2026
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main
        with:
          fetch-depth: 0

      - name: Read preview version
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          $previousPreviewSha = ""
          git fetch --force origin "refs/tags/preview:refs/tags/preview" 2>$null
          if ($LASTEXITCODE -eq 0) {
            $previousPreviewSha = (git rev-parse "refs/tags/preview^{commit}").Trim()
          } else {
            $global:LASTEXITCODE = 0
          }

          $releaseBody = ""
          gh release view preview --json body --jq ".body" *> release-body.txt
          if ($LASTEXITCODE -eq 0) {
            $releaseBody = Get-Content release-body.txt -Raw
          } else {
            $global:LASTEXITCODE = 0
          }

          $previousNumber = 0
          if ($releaseBody -match '<!--\s*preview-number:\s*(\d+)\s*-->') {
            $previousNumber = [int]$Matches[1]
          }

          $previewNumber = $previousNumber + 1
          $previewVersion = "0.0.0-preview.$previewNumber"
          $previewLabel = "Preview.$previewNumber"
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          "version=$previewVersion" >> $env:GITHUB_OUTPUT
          "number=$previewNumber" >> $env:GITHUB_OUTPUT
          "label=$previewLabel" >> $env:GITHUB_OUTPUT
          "short_sha=$shortSha" >> $env:GITHUB_OUTPUT
          "previous_sha=$previousPreviewSha" >> $env:GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Restore Bun cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.94.0

      - name: Install NSIS
        run: choco install nsis --version=3.11 -y --no-progress

      - name: Restore Rust cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: ${{ runner.os }}-windows-preview-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-windows-preview-rust-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Create preview release notes
        shell: pwsh
        run: |
          bun scripts/preview-release-notes.ts `
            --repo "${{ github.repository }}" `
            --label "${{ steps.version.outputs.label }}" `
            --from "${{ steps.version.outputs.previous_sha }}" `
            --to "${{ github.sha }}" `
            --out preview-release-notes.md

          $notes = Get-Content preview-release-notes.md -Raw
          $body = "<!-- preview-number: ${{ steps.version.outputs.number }} -->`n$notes"
          Set-Content -Path preview-release-body.md -Value $body -Encoding utf8

      - name: Build preview bundles
        env:
          REPRESSURIZER_PREVIEW_NUMBER: ${{ steps.version.outputs.number }}
          REPRESSURIZER_PREVIEW_VERSION: ${{ steps.version.outputs.version }}
          REPRESSURIZER_PREVIEW_LABEL: ${{ steps.version.outputs.label }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run build:preview

      - name: Collect preview artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $label = "${{ steps.version.outputs.label }}"
          $shortSha = "${{ steps.version.outputs.short_sha }}"
          $installer = Get-ChildItem src-tauri\target\release\bundle\nsis -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Could not find preview NSIS installer"
          }

          $signaturePath = "$($installer.FullName).sig"
          if (-not (Test-Path $signaturePath)) {
            throw "Could not find updater signature for $($installer.Name)"
          }

          $portableName = "Repressurizer-$label-portable.exe"
          $zipName = "Repressurizer-$label-portable-windows-x64.zip"
          $installerName = "Repressurizer-$label-windows-x64-setup.exe"

          Copy-Item src-tauri\target\release\repressurizer.exe "artifacts\$portableName"
          Compress-Archive -Path "artifacts\$portableName" -DestinationPath "artifacts\$zipName" -Force
          Copy-Item $installer.FullName "artifacts\$installerName"
          Copy-Item $signaturePath "artifacts\$installerName.sig"
          Get-ChildItem artifacts | ForEach-Object { "$($_.Name) $($_.Length) bytes" }

      - name: Create preview updater manifest
        shell: pwsh
        run: |
          $installer = Get-ChildItem artifacts -Filter "Repressurizer-${{ steps.version.outputs.label }}-windows-x64-setup.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Could not find preview NSIS installer"
          }

          $signaturePath = "$($installer.FullName).sig"
          if (-not (Test-Path $signaturePath)) {
            throw "Could not find updater signature for $($installer.Name)"
          }

          $assetName = [System.Uri]::EscapeDataString($installer.Name)
          $assetUrl = "https://github.com/${{ github.repository }}/releases/download/preview/$assetName"
          $notes = (Get-Content preview-release-notes.md -Raw).Trim()
          $manifest = [ordered]@{
            version = "${{ steps.version.outputs.version }}"
            notes = $notes
            pub_date = (Get-Date).ToUniversalTime().ToString("o")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = (Get-Content $signaturePath -Raw).Trim()
                url = $assetUrl
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 8 | Set-Content -Path artifacts\latest-preview.json -Encoding utf8

      - name: Create preview artifact checksums
        shell: pwsh
        run: |
          $lines = Get-ChildItem artifacts -File |
            Where-Object { $_.Name -ne "SHA256SUMS.txt" } |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            }
          Set-Content -Path artifacts\SHA256SUMS.txt -Value $lines -Encoding utf8

      - name: Publish preview release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f preview "${{ github.sha }}"
          git push origin preview --force

          $releaseExists = $true
          gh release view preview *> $null
          if ($LASTEXITCODE -ne 0) {
            $releaseExists = $false
          }

          if ($releaseExists) {
            gh release edit preview --title "Repressurizer ${{ steps.version.outputs.label }}" --notes-file preview-release-body.md --prerelease
            $assets = gh release view preview --json assets --jq '.assets[].name'
            foreach ($asset in $assets) {
              if ($asset) {
                gh release delete-asset preview "$asset" --yes
              }
            }
          } else {
            gh release create preview --title "Repressurizer ${{ steps.version.outputs.label }}" --notes-file preview-release-body.md --prerelease --latest=false
          }
          gh release upload preview artifacts/* --clobber
