name: Publish Integration Package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and pack without publishing"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "integration-v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate integration package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check integration package
        run: bun run --cwd packages/integration check

      - name: Build integration package
        run: bun run --cwd packages/integration build

      - name: Pack integration package
        working-directory: packages/integration
        run: bun pm pack --dry-run

      - name: Validate integration tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="$(bun -e 'const pkg = await Bun.file("packages/integration/package.json").json(); console.log(pkg.version)')"
          expected="integration-v${version}"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "Expected tag ${expected}, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check integration package
        run: bun run --cwd packages/integration check

      - name: Build integration package
        run: bun run --cwd packages/integration build

      - name: Publish integration package
        working-directory: packages/integration
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
