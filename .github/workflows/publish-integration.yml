name: Publish Integration Package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and pack without publishing"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "integration-v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate integration package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check integration package
        run: bun run --cwd packages/integration check

      - name: Build integration package
        run: bun run --cwd packages/integration build

      - name: Pack integration package
        working-directory: packages/integration
        run: bun pm pack --dry-run

      - name: Validate integration tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="$(bun -e 'const pkg = await Bun.file("packages/integration/package.json").json(); console.log(pkg.version)')"
          expected="integration-v${version}"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "Expected tag ${expected}, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Setup Node for npm publish
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check integration package
        run: bun run --cwd packages/integration check

      - name: Build integration package
        run: bun run --cwd packages/integration build

      - name: Read package metadata
        id: package
        run: |
          name="$(bun -e 'const pkg = await Bun.file("packages/integration/package.json").json(); console.log(pkg.name)')"
          version="$(bun -e 'const pkg = await Bun.file("packages/integration/package.json").json(); console.log(pkg.version)')"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Check npm registry
        id: npmjs
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish integration package to npm
        if: steps.npmjs.outputs.exists == 'false'
        working-directory: packages/integration
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip npm publish
        if: steps.npmjs.outputs.exists == 'true'
        run: echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists on npmjs.org."

      - name: Setup Node for GitHub Packages publish
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"
          scope: "@crimsab"

      - name: Check GitHub Packages registry
        id: github_packages
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Point package metadata at GitHub Packages
        if: steps.github_packages.outputs.exists == 'false'
        working-directory: packages/integration
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          pkg.publishConfig = {
            ...(pkg.publishConfig ?? {}),
            registry: "https://npm.pkg.github.com"
          };
          fs.writeFileSync("package.json", `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Publish integration package to GitHub Packages
        if: steps.github_packages.outputs.exists == 'false'
        working-directory: packages/integration
        run: npm publish --access public --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Skip GitHub Packages publish
        if: steps.github_packages.outputs.exists == 'true'
        run: echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists on GitHub Packages."
