[package]
name = "repressurizer-integration"
version = "0.3.0"
edition = "2021"
description = "Schema-first Repressurizer snapshot contract and Rust helpers for library receivers."
license = "GPL-3.0-only"
repository = "https://github.com/Crimsab/Repressurizer"
homepage = "https://github.com/Crimsab/Repressurizer"
readme = "README.md"
keywords = ["steam", "repressurizer", "schema", "snapshot"]
categories = ["data-structures", "parser-implementations"]
include = ["src/**", "schema/**", "tests/**", "README.md", "Cargo.toml"]

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
